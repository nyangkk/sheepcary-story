<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bad</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .page-wrapper {
      max-width: 1728px;
      height: 100vh;
      margin: 0 auto;
      position: relative;
    }

    .section-bg {
      width: 100%;
      height: 100vh;
      background-image: url(black.png);
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      top: -30px;
      left: 0;
      width: 100%;
      height: calc(100% + 30px);
      background: rgba(0, 0, 0, 0.70);
    }

    .title {
      position: absolute;
      width: 929px;
      top: 454px;
      left: 399px;
      text-align: center;
      color: #00FF11;
      font-size: 100px;
      font-weight: 600;
      line-height: 120px;
    }

    .sub-text {
      position: absolute;
      width: 403px;
      top: 585px;
      left: 662px;
      text-align: center;
      color: white;
      font-size: 20px;
      line-height: 24px;
    }

    .btn-back {
      position: absolute;
      width: 304px;
      height: 120px;
      top: 662px;
      left: 698px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00FF11;
      font-size: 30px;
      font-weight: 900;
      line-height: 36px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <section class="section-bg">

      <div class="overlay"></div>

      <div class="title">you failed...</div>
      <div class="sub-text">이미 주변은 양들로 가득했습니다...<br/>당신은 양이 되어 영원히 초원을 뛰어노는 꿈을 <br>꾸게 됩니다</div>
      <div class="btn-back" onclick="window.location.href='black1.html?state=2'">뒤로 돌아가기</div>

    </section>
  </div>
</body>
</html>
