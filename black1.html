<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>black1</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .page-wrapper {
      max-width: 1728px;
      height: 100vh;
      margin: 0 auto;
      position: relative;
    }

    .section-bg {
      width: 100%;
      height: 100vh;
      background-image: url(black1.png);
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }

    .surround-text,
    .panic-text,
    .btn-run,
    .btn-item,
    .confirm-text,
    .btn-yes,
    .btn-back-confirm {
      display: none;
      position: absolute;
    }

    .surround-text {
      width: 800px;
      top: 450px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 64px;
      font-weight: 700;
      line-height: 76.80px;
    }

    .panic-text {
      width: 403px;
      top: 50px;
      left: 667px;
      text-align: center;
      color: white;
      font-size: 20px;
      font-weight: 600;
      line-height: 24px;
    }

    .btn-run {
      width: 282px;
      height: 120px;
      top: 499px;
      left: 545px;
      align-items: center;
      justify-content: center;
      color: #00FF11;
      font-size: 40px;
      font-weight: 900;
      line-height: 48px;
      cursor: pointer;
    }

    .btn-item {
      width: 304px;
      height: 120px;
      top: 499px;
      left: 879px;
      align-items: center;
      justify-content: center;
      color: #00FF11;
      font-size: 40px;
      font-weight: 900;
      line-height: 48px;
      cursor: pointer;
    }

    .confirm-text {
      top: 476px;
      left: 487px;
      text-align: center;
      color: #00FF11;
      font-size: 80px;
      font-weight: 700;
      line-height: 96px;
    }

    .btn-back-confirm {
      width: 304px;
      height: 120px;
      top: 566px;
      left: 617px;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      font-weight: 900;
      line-height: 48px;
      cursor: pointer;
    }

    .btn-yes {
      width: 85px;
      height: 120px;
      top: 566px;
      left: 941px;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      font-weight: 900;
      line-height: 48px;
      cursor: pointer;
    }

    .btn-run.show,
    .btn-item.show,
    .btn-back-confirm.show,
    .btn-yes.show { display: flex; }

    .surround-text.show,
    .panic-text.show,
    .confirm-text.show { display: block; }
  </style>
  <script>

        window.onload = function() {
      if (new URLSearchParams(window.location.search).get('state') === '2') {
        show('.panic-text', '.btn-run', '.btn-item');
        state = 2;
      }
    }
    let state = 0;

    function show(...els) { els.forEach(e => document.querySelector(e).classList.add('show')); }
    function hide(...els) { els.forEach(e => document.querySelector(e).classList.remove('show')); }

    function handleBgClick() {
      if (state === 0) {
        show('.surround-text');
        state = 1;
      } else if (state === 1) {
        hide('.surround-text');
        show('.panic-text', '.btn-run', '.btn-item');
        state = 2;
      }
    }

    function runAway() {
      hide('.btn-run', '.btn-item');
      show('.confirm-text', '.btn-back-confirm', '.btn-yes');
      state = 3;
    }

    function backToChoice() {
      hide('.confirm-text', '.btn-back-confirm', '.btn-yes');
      show('.btn-run', '.btn-item');
      state = 2;
    }
  </script>
</head>
<body>
  <div class="page-wrapper">
    <section class="section-bg" onclick="if(event.target===this) handleBgClick()">

      <div class="surround-text">
        <span style="color:white;">어느새 </span><span style="color:#00FF11;">모든 양들이</span><span style="color:white;"> 당신을<br/>둘러싸 지켜보고 있다...</span>
      </div>

      <div class="panic-text">당신은 패닉에 휩싸였다...<br/>어떻게 해야할지 모르겠다</div>

      <div class="btn-run" onclick="runAway()">뒤돌아 도망치기</div>
      <div class="btn-item" onclick="window.location.href='black2.html'">아이템을 사용하기</div>

      <div class="confirm-text">정말 도망치시겠습니까?</div>
      <div class="btn-back-confirm" onclick="backToChoice()">뒤로 돌아가기</div>
      <div class="btn-yes" onclick="window.location.href='bad.html'">네</div>

    </section>
  </div>
</body>
</html>
