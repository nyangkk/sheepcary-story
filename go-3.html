<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이템 선택</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
    }
    .page-wrapper {
      max-width: 1728px;
      height: 100vh;
      margin: 0 auto;
      position: relative;
    }
    .section-bg {
      width: 100%;
      height: 100vh;
      background-image: url(endback.png);
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    .subtitle {
      width: 403px;
      height: 120px;
      left: 667px;
      top: 50px;
      position: absolute;
      text-align: center;
      color: white;
      font-size: 20px;
      font-weight: 600;
      line-height: 24px;
      word-wrap: break-word;
    }
    .overlay-base {
      width: 1742px;
      height: 1147px;
      left: 0px;
      top: -30px;
      position: absolute;
      background: rgba(0, 0, 0, 0.60);
    }
    .item-image {
      width: 893px;
      height: 505.50px;
      left: 417px;
      top: 235px;
      position: absolute;
    }
    .choice-label {
      position: absolute;
      top: 765px;
      left: 399px;
      width: 929px;
      height: 56px;
      text-align: center;
      color: #00FF11;
      font-size: 55px;
      font-weight: 700;
      line-height: 66px;
    }
    .btn-cookie {
      width: 287px;
      height: 120px;
      left: 574px;
      top: 845px;
      position: absolute;
      text-align: center;
      display: block;
      color: white;
      font-size: 40px;
      font-weight: 700;
      line-height: 120px;
      cursor: pointer;
    }
    .btn-doll {
      width: 248px;
      height: 120px;
      left: 878px;
      top: 845px;
      position: absolute;
      text-align: center;
      display: block;
      color: white;
      font-size: 40px;
      font-weight: 700;
      line-height: 120px;
      cursor: pointer;
    }
    .confirm-layer {
      display: none;
    }
    .confirm-layer.active {
      display: block;
    }
    .overlay-confirm {
      width: 1742px;
      height: 1147px;
      left: 0px;
      top: -30px;
      position: absolute;
      background: rgba(0, 0, 0, 0.60);
    }
    .confirm-question {
      left: 608px;
      top: 456px;
      position: absolute;
      text-align: center;
    }
    .btn-yes {
      width: 85px;
      height: 120px;
      left: 941px;
      top: 666px;
      position: absolute;
      text-align: center;
      display: block;
      color: white;
      font-size: 40px;
      font-weight: 700;
      line-height: 120px;
      cursor: pointer;
    }
    .btn-back {
      width: 304px;
      height: 120px;
      left: 617px;
      top: 666px;
      position: absolute;
      text-align: center;
      display: block;
      color: white;
      font-size: 40px;
      font-weight: 700;
      line-height: 120px;
      cursor: pointer;
    }
    .section-bg.confirm-active .choice-label,
    .section-bg.confirm-active .btn-cookie,
    .section-bg.confirm-active .btn-doll {
      visibility: hidden;
    }
  </style>
  <script>
    function showConfirm() {
      document.querySelector('.section-bg').classList.add('confirm-active');
      document.querySelector('.confirm-layer').classList.add('active');
    }
    function hideConfirm() {
      document.querySelector('.section-bg').classList.remove('confirm-active');
      document.querySelector('.confirm-layer').classList.remove('active');
    }
  </script>
</head>
<body>
  <div class="page-wrapper">
    <section class="section-bg">
      <div class="subtitle">무서운 양 인형이 당신을 빤히 바라보고 있다...<br/>어떻게든 시선을 돌려야 할 것 같다</div>
      <div class="overlay-base"></div>
      <img class="item-image" src="sheep item.png" />
      <div class="choice-label">무엇을 사용하시겠습니까?</div>
      <div class="btn-cookie" onclick="window.location.href='cookie-1.html'">양 모양 쿠키</div>
      <div class="btn-doll" onclick="showConfirm()">아기 양 인형</div>

      <div class="confirm-layer">
        <div class="overlay-confirm"></div>
        <div class="confirm-question">
          <span style="color:#00FF11; font-size:65px; font-weight:700; line-height:78px;">정말 </span><span style="color:white; font-size:65px; font-weight:700; line-height:78px;">아기 양 인형 </span><span style="color:#00FF11; font-size:65px; font-weight:700; line-height:78px;">을<br/>사용하시겠습니까?</span>
        </div>
        <div class="btn-yes" onclick="window.location.href='go-4.html'">네</div>
        <div class="btn-back" onclick="hideConfirm()">뒤로 돌아가기</div>
      </div>
    </section>
  </div>
</body>
</html>
