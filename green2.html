<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>green2</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .page-wrapper {
      max-width: 1728px;
      height: 100vh;
      margin: 0 auto;
      position: relative;
    }

    .section-bg {
      width: 100%;
      height: 100vh;
      background-image: url(green1.png);
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .overlay-dark {
      position: absolute;
      top: -30px;
      left: 0;
      width: 100%;
      height: calc(100% + 30px);
      background: rgba(0, 0, 0, 0.55);
    }

    .baby-image {
      position: absolute;
      width: 522px;
      height: 506px;
      left: 603px;
      top: 306px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .baby-text {
      position: absolute;
      width: 403px;
      top: 873px;
      left: 662px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }

    .overlay-light {
      position: absolute;
      top: -30px;
      left: 0;
      width: 100%;
      height: calc(100% + 30px);
      background: rgba(0, 0, 0, 0.30);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    .awake-text {
      position: absolute;
      width: 929px;
      height: 243px;
      top: 445px;
      left: 399px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      font-size: 30px;
      font-weight: 700;
      line-height: 36px;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }

    .state-1 .baby-image,
    .state-1 .baby-text { opacity: 1; }

    .state-2 .baby-image,
    .state-2 .baby-text { opacity: 0; transition: opacity 0.5s ease; }
    .state-2 .overlay-light,
    .state-2 .awake-text { opacity: 1; }
  </style>
  <script>
    let state = 0;
    function handleClick() {
      const bg = document.querySelector('.section-bg');
      if (state === 0) {
        bg.classList.add('state-1');
        state = 1;
      } else if (state === 1) {
        bg.classList.remove('state-1');
        bg.classList.add('state-2');
        state = 2;
      } else {
        window.location.href = 'black1.html';
      }
    }
  </script>
</head>
<body>
  <div class="page-wrapper">
    <section class="section-bg" onclick="handleClick()">

      <div class="overlay-dark"></div>

      <img class="baby-image" src="baby.png" />

      <div class="baby-text">
        <span style="color:#00FF11; font-size:30px; line-height:36px;">아기 양 인형</span><span style="color:white; font-size:30px; line-height:36px;">을 발견했다...<br/></span>
      </div>

      <div class="overlay-light"></div>

      <div class="awake-text">
        당신은 잠시 정신을 차렸다...<br/>이게 어떻게 된 일인지 주위를 돌아본다
      </div>

    </section>
  </div>
</body>
</html>
