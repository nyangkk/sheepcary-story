<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>집</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
  <style>
    
    html, body {
      height: 100%;
      overflow: hidden;
     }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
    }

    body { background: black; }

    .page-wrapper {
      max-width: 1728px;
      min-height: 1117px;
      margin: 0 auto;
      position: relative;
    }

    .section-image {
      display: flex;
      justify-content: center;
      padding-top: 392px;
    }

    .circle-image {
      width: 338px;
      height: 333px;
      border-radius: 9999px;
      background: #D9D9D9;
      cursor: pointer;
      overflow: hidden;
    }

    .circle-image img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .section-caption {
      display: flex;
      justify-content: center;
      margin-top: 158px;
    }

    .caption-text {
      display: none;
      width: 403px;
      text-align: center;
      color: white;
      font-size: 20px;
      line-height: 24px;
    }

    .caption-text.visible {
      display: block;
    }
  </style>
  <script>
    function handleClick() {
  const caption = document.getElementById('caption');
  if (!caption.classList.contains('visible')) {
    caption.classList.add('visible');
  } else {
    window.location.href = 'index4.html';
  }
}
  </script>
</head>
<body>
  <div class="page-wrapper">

    <section class="section-image">
      <div class="circle-image" onclick="handleClick()">
        <img src="image 3.png" />
      </div>
    </section>

    <section class="section-caption">
      <div id="caption" class="caption-text">
        멀리 집이 보인다...<br/>다가가보자
      </div>
    </section>
  </div>
</body>
</html>
