<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .page-wrapper {
      max-width: 1728px;
      height: 100vh;
      margin: 0 auto;
      position: relative;
    }

    .section-bg {
      width: 100%;
      height: 100vh;
      background-image: url(house.png);
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .top-text {
      position: absolute;
      width: 403px;
      top: 50px;
      left: 667px;
      text-align: center;
      color: white;
      font-size: 20px;
      line-height: 24px;
    }

    .closet-area {
      width: 645px;
      height: 968px;
      position: absolute;
      left: 871px;
      top: 128px;
    }

    .closet-area img {
      width: 615px;
      height: 923px;
      position: absolute;
      left: 0;
      top: 0;
    }

    .question-text {
      position: absolute;
      width: 929px;
      top: 476px;
      left: 399px;
      text-align: center;
      color: #00FF11;
      font-size: 80px;
      font-weight: 700;
      line-height: 96px;
    }

    .btn-back {
      position: absolute;
      width: 304px;
      height: 120px;
      top: 566px;
      left: 617px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      font-weight: 900;
      line-height: 48px;
      cursor: pointer;
    }

    .btn-yes {
      position: absolute;
      width: 85px;
      height: 120px;
      top: 566px;
      left: 941px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      font-weight: 900;
      line-height: 48px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <section class="section-bg">

      <div class="top-text">집에 들어오자 마자<br/>문과 기묘한 옷장이 보인다...</div>

      <div class="closet-area">
        <img src="closet.png" />
      </div>

      <div class="question-text">정말 믿으시겠습니까?</div>

      <div class="btn-back" onclick="window.location.href='index5.html?revealed=true'">뒤로 돌아가기</div>

      <div class="btn-yes" onclick="window.location.href='door-end.html'">네</div>

    </section>
  </div>
</body>
</html>
