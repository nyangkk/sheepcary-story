<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>창문</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
    }
    body {
      background: black;
      margin: 0;
      overflow: hidden;
    }
    .page-wrapper {
      max-width: 1728px;
      height: 100vh;
      margin: 0 auto;
      position: relative;
    }
    .section-bg {
      width: 100%;
      height: 100vh;
      background: black;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }
    .image-area {
      width: 1440px;
      height: 961px;
      position: absolute;
      left: 144px;
      top: 78px;
      transform: translateX(100vw);
      animation: slideIn 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100vw);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .img-sheep {
      width: 1439px;
      height: 919px;
      position: absolute;
      left: 0;
      top: 21px;
      transform-origin: center center;
      transition: transform 3s ease;
    }
    .img-window {
      width: 1728px;
      height: 1117px;
      position: absolute;
      left: 0;
      top: 7px;
    }
    .top-text {
      width: 403px;
      position: absolute;
      top: 50px;
      left: 667px;
      text-align: center;
      color: white;
      font-size: 20px;
      line-height: 24px;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }
    .choices {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    .choices.visible {
      opacity: 1;
      pointer-events: all;
    }
    .btn-approach {
      width: 394px;
      height: 98px;
      position: absolute;
      left: 851px;
      top: 911px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      color: #00FF11;
      font-size: 40px;
      font-weight: 700;
      line-height: 48px;
      cursor: pointer;
    }
    .btn-no-approach {
      width: 394px;
      height: 98px;
      position: absolute;
      left: 482px;
      top: 911px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      color: #00FF11;
      font-size: 40px;
      font-weight: 700;
      line-height: 48px;
      cursor: pointer;
    }
    .approach-text {
      width: 590px;
      position: absolute;
      top: 50px;
      left: 569px;
      text-align: center;
      color: white;
      font-size: 30px;
      line-height: 36px;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <section class="section-bg" id="scene" onclick="handleClick()">
      <div class="image-area" id="imageArea">
        <img class="img-sheep" id="sheep" src="sheep1.png" />
        </div>
        <img class="img-window" id="windowImg" src="window.png" />
      </div>
      <div class="top-text" id="topText">창문 바깥의 양과 눈이 마주쳤습니다...</div>
      <div class="choices" id="choices">
        <div class="btn-approach" onclick="event.stopPropagation(); handleApproach();">다가가보기</div>
        <div class="btn-no-approach" onclick="event.stopPropagation();">다가가지 않기</div>
      </div>
      <div class="approach-text" id="approachText">당신은 홀린 듯이 다가갈 수 밖에 없었다...</div>
    </section>
  </div>
  <script>
    var phase = 0;

    document.getElementById('imageArea').addEventListener('animationend', function () {
      var topText = document.getElementById('topText');
      topText.style.opacity = '1';
      phase = 1;
    });

    function handleClick() {
      if (phase !== 1) return;
      phase = 2;
      document.getElementById('choices').classList.add('visible');
      document.getElementById('scene').onclick = null;
    }

    function handleApproach() {
      if (phase !== 2) return;
      phase = 3;
      document.getElementById('choices').style.opacity = '0';
      document.getElementById('choices').style.pointerEvents = 'none';
      document.getElementById('topText').style.opacity = '0';
      document.getElementById('approachText').style.opacity = '1';
      document.getElementById('sheep').style.transform = 'scale(2.3) translate(0px, 10px)';
      document.getElementById('windowImg').style.transition = 'transform 3s ease';
      document.getElementById('windowImg').style.transformOrigin = 'center center';
      document.getElementById('windowImg').style.transform = 'scale(1.3)';
      setTimeout(function() {
    document.getElementById('scene').onclick = function() {
      window.location.href = 'window-2.html';
    };
}, 3000);
    }
  </script>
</body>
</html>
